<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="assets/css/styles-registre.css">
  <title>Cadastro</title>
</head>

<body>
  <main class="container">
    <form>
      <h1>Cadastro 404</h1>
      <div class="input-box">
        <input placeholder="Nome" type="text" required>
        <i class="bx bxs-user"></i>
      </div>

      <div class="input-box">
        <input placeholder="Email" type="email" required>
        <i class="bx bxs-user"></i>
      </div>

      <div class="input-box">
        <input placeholder="Senha" type="password" required>
        <i class="bx bxs-lock-alt"></i>
      </div>

      <div class="type">
        <h3>Tipo</h3>
        <label>
          <input type="radio" name="tipo" value="atendente"> Atendente<br>
          <input type="radio" name="tipo" value="garcom"> Garçom<br>
          <input type="radio" name="tipo" value="gerente"> Gerente
        </label>
      </div>

      <button type="submit" class="login">Cadastrar</button>

      <div class="register-link">
        <p>Já tem uma conta? <a href="login.html">Login</a></p>
      </div>

    </form>
  </main>
</body>

</html>
