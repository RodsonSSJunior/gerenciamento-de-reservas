<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="assets/css/styles-login.css">
  <title>Login</title>
</head>

<body>
  <main class="container">
    <form id="form-login">
      <h1>Login 404</h1>
      <div class="input-box">
        <input placeholder="Email" type="email" id="email" required>
        <i class="bx bxs-user"></i>
      </div>
      <div class="input-box">
        <input placeholder="Senha" type="password" id="senha" required>
        <i class="bx bxs-show" onclick="mostrarSenha()"></i>

      </div>
      <button type="submit" class="login">Login</button>

      <div class="register-link">
        <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
      </div>

    </form>
  </main>
  <script src="./js/login.js"></script>
</body>

</html>
